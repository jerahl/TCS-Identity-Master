; TCS Identity Master — dedicated PHP-FPM pool
; -----------------------------------------------------------------------------
; Debian's stock pool (pool.d/www.conf) ships pm.max_children = 5. A single slow
; request holds a worker for its whole duration, so five concurrent slow requests
; wedge the whole site and nginx returns 504:
;   WARNING: [pool www] server reached pm.max_children setting (5), consider raising it
;
; The two long jobs that used to cause this — the Google and Adaxes syncs (a live
; remote lookup PER PERSON, minutes long) — now run in the BACKGROUND via systemd
; (see idm-google-sync.service / idm-adaxes-sync.service and the "Run … now"
; buttons), so they no longer occupy a web worker at all. What's left in-request is
; page renders plus the odd bounded job (a CSV import, the per-person live AD/Google
; panel — each a single short-timeout lookup). This pool gives that comfortable
; headroom and makes a wedged request self-terminate instead of piling up.
;
; This is a DEDICATED pool (its own socket) so it doesn't clobber the stock `www`
; pool. Install it and point nginx at the new socket — see deploy/README.md.
; Adjust the numbers to your box (sizing math below).

[idm]
user = www-data
group = www-data

; Own socket so the stock www pool is left untouched. Update nginx:
;   fastcgi_pass unix:/run/php/idm.sock;
listen = /run/php/idm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; --- Process manager -------------------------------------------------------
; dynamic: keep a few idle workers ready, scale up to max under load.
pm = dynamic

; SIZING: pm.max_children is the hard ceiling on concurrent PHP requests, and the
; main RAM lever — each worker peaks around its memory_limit in the worst case,
; but typically uses ~30–60 MB. Budget:
;     pm.max_children  ≈  (RAM to give PHP)  /  (avg worker RSS)
; e.g. ~1.5 GB for PHP ÷ ~60 MB ≈ 24. On a 2 GB box use ~16; on 4 GB, ~40. Watch
; `systemctl status php*-fpm` for the "reached pm.max_children" line and raise if
; it recurs AND you have the RAM.
pm.max_children = 24
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 12

; Recycle a worker after this many requests to cap any slow memory growth.
pm.max_requests = 500

; Expose the pool's live status to localhost (optional; handy for tuning). Reach
; it by adding an internal nginx location that fastcgi_pass'es /fpm-status here.
;pm.status_path = /fpm-status

; --- Safety valves ---------------------------------------------------------
; Kill any single request still running after 120s so a hung upstream (a slow
; ODBC/AD/Google call that outlasts its own timeout) frees its worker instead of
; holding a slot until nginx 504s. Keep this ABOVE the app's remote timeouts
; (ADAXES_TIMEOUT, GAM_TIMEOUT, DB) and BELOW nginx's fastcgi_read_timeout so PHP
; logs the offender before nginx cuts the connection. The full syncs are NOT
; affected — they run under systemd, not here.
request_terminate_timeout = 120s

; Per-request memory ceiling (also bounds worst-case RAM per worker above).
php_admin_value[memory_limit] = 256M

; Log slow requests (with a PHP backtrace) so you can see WHAT is slow, not just
; that something was. Tune the threshold to taste.
;slowlog = /var/log/php-fpm/idm-slow.log
;request_slowlog_timeout = 10s

; Send PHP warnings/errors to the FPM error log (never to the browser).
php_admin_value[error_log] = /var/log/php-fpm/idm-error.log
php_admin_flag[log_errors] = on
catch_workers_output = yes
