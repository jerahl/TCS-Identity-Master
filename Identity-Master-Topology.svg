<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 880" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#3c4043"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#8430ce"/></marker>
  </defs>
  <rect x="0" y="0" width="1560" height="880" fill="#ffffff"/>

  <text x="40" y="42" font-size="25" font-weight="700" fill="#202124">TCS Identity Master — Target Topology</text>
  <text x="40" y="70" font-size="14" fill="#5f6368">One golden record per person feeds OneSync as a single source → one OneSync user per person. Purple = username write-back loop.</text>

  <!-- INPUTS -->
  <text x="120" y="120" font-size="12" font-weight="700" fill="#5f6368" text-anchor="middle">SOURCES</text>
  <rect x="30" y="135" width="190" height="58" rx="8" fill="#e8eaed" stroke="#5f6368" stroke-width="1.5"/>
  <text x="125" y="160" font-size="13" font-weight="700" fill="#3c4043" text-anchor="middle">NextGen HR</text>
  <text x="125" y="178" font-size="10.5" fill="#5f6368" text-anchor="middle">employment feed</text>

  <rect x="30" y="208" width="190" height="58" rx="8" fill="#f3e8fd" stroke="#8430ce" stroke-width="1.5"/>
  <text x="125" y="233" font-size="13" font-weight="700" fill="#5b1ca0" text-anchor="middle">PowerSchool</text>
  <text x="125" y="251" font-size="10.5" fill="#5b1ca0" text-anchor="middle">existing staff extract</text>

  <rect x="30" y="281" width="190" height="64" rx="8" fill="#fff3e0" stroke="#e8710a" stroke-width="1.5"/>
  <text x="125" y="305" font-size="13" font-weight="700" fill="#b06000" text-anchor="middle">Manual (dashboard)</text>
  <text x="125" y="322" font-size="10.5" fill="#b06000" text-anchor="middle">subs, contractors,</text>
  <text x="125" y="337" font-size="10.5" fill="#b06000" text-anchor="middle">conversions</text>

  <!-- INGEST -->
  <rect x="290" y="150" width="200" height="190" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="390" y="176" font-size="13.5" font-weight="700" fill="#174ea6" text-anchor="middle">Ingestion + Matching</text>
  <text x="390" y="200" font-size="10.5" fill="#174ea6" text-anchor="middle">staging records</text>
  <text x="390" y="220" font-size="10.5" fill="#174ea6" text-anchor="middle">score: id / name+DOB</text>
  <text x="390" y="240" font-size="10.5" fill="#174ea6" text-anchor="middle">school + ethnicity maps</text>
  <text x="390" y="260" font-size="10.5" fill="#174ea6" text-anchor="middle">multi-location collapse</text>
  <text x="390" y="284" font-size="10.5" font-weight="700" fill="#a50e0e" text-anchor="middle">name-only → review queue</text>
  <text x="390" y="308" font-size="10" font-style="italic" fill="#5f6368" text-anchor="middle">(old script logic lives here)</text>

  <!-- PERSON MASTER DB -->
  <rect x="560" y="120" width="260" height="250" rx="10" fill="#e6f4ea" stroke="#137333" stroke-width="2.5"/>
  <text x="690" y="148" font-size="15" font-weight="700" fill="#0d652d" text-anchor="middle">PERSON MASTER DB</text>
  <text x="690" y="167" font-size="10.5" font-style="italic" fill="#0d652d" text-anchor="middle">golden record · MySQL</text>
  <line x1="576" y1="178" x2="804" y2="178" stroke="#9cc7ab" stroke-width="1"/>
  <text x="582" y="200" font-size="11" fill="#0d652d">• person (one row per human)</text>
  <text x="582" y="222" font-size="11" fill="#0d652d">• source-ID crosswalk (all IDs)</text>
  <text x="582" y="244" font-size="11" fill="#0d652d">• assignments (primary location)</text>
  <text x="582" y="266" font-size="11" fill="#0d652d">• username/email (locked once set)</text>
  <text x="582" y="288" font-size="11" fill="#0d652d">• lifecycle + audit</text>
  <text x="690" y="322" font-size="10.5" font-weight="700" fill="#0d652d" text-anchor="middle">one person = one record</text>
  <text x="690" y="340" font-size="10.5" fill="#0d652d" text-anchor="middle">(kills per-source duplication)</text>

  <!-- Dashboard -->
  <rect x="560" y="392" width="260" height="56" rx="8" fill="#fff3e0" stroke="#e8710a" stroke-width="2"/>
  <text x="690" y="416" font-size="13" font-weight="700" fill="#b06000" text-anchor="middle">Dashboard (PHP)</text>
  <text x="690" y="434" font-size="10.5" fill="#b06000" text-anchor="middle">manage · merge/convert · overrides · audit</text>

  <!-- OneSync source view -->
  <rect x="880" y="170" width="180" height="150" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
  <text x="970" y="196" font-size="12.5" font-weight="700" fill="#0d652d" text-anchor="middle">v_onesync_source</text>
  <text x="970" y="216" font-size="10.5" fill="#0d652d" text-anchor="middle">read-only view</text>
  <text x="970" y="236" font-size="10.5" fill="#0d652d" text-anchor="middle">one row / person</text>
  <text x="970" y="256" font-size="10.5" fill="#0d652d" text-anchor="middle">uniqueId = person_uuid</text>
  <text x="970" y="280" font-size="10" font-style="italic" fill="#5f6368" text-anchor="middle">the SINGLE</text>
  <text x="970" y="296" font-size="10" font-style="italic" fill="#5f6368" text-anchor="middle">OneSync source</text>

  <!-- OneSync -->
  <rect x="1120" y="170" width="170" height="150" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2.5"/>
  <text x="1205" y="200" font-size="14" font-weight="700" fill="#174ea6" text-anchor="middle">OneSync</text>
  <text x="1205" y="222" font-size="10.5" fill="#174ea6" text-anchor="middle">one user / person</text>
  <text x="1205" y="242" font-size="10.5" fill="#174ea6" text-anchor="middle">mints username</text>
  <text x="1205" y="262" font-size="10.5" fill="#174ea6" text-anchor="middle">(jsmith / jsmith1)</text>
  <text x="1205" y="284" font-size="10.5" fill="#174ea6" text-anchor="middle">provisioning engine</text>

  <!-- Endpoints -->
  <rect x="1340" y="150" width="190" height="46" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
  <text x="1435" y="178" font-size="12.5" font-weight="700" fill="#0d652d" text-anchor="middle">Active Directory</text>
  <rect x="1340" y="206" width="190" height="46" rx="8" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="1435" y="234" font-size="12.5" font-weight="700" fill="#b06000" text-anchor="middle">Google Workspace</text>
  <rect x="1340" y="262" width="190" height="46" rx="8" fill="#fce8e6" stroke="#c5221f" stroke-width="1.5"/>
  <text x="1435" y="290" font-size="12.5" font-weight="700" fill="#a50e0e" text-anchor="middle">Raptor</text>

  <!-- arrows: sources -> ingest -->
  <line x1="220" y1="164" x2="290" y2="200" stroke="#3c4043" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="220" y1="237" x2="290" y2="240" stroke="#3c4043" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="220" y1="312" x2="290" y2="280" stroke="#3c4043" stroke-width="1.8" marker-end="url(#a)"/>
  <!-- ingest -> DB -->
  <line x1="490" y1="240" x2="560" y2="240" stroke="#3c4043" stroke-width="2.2" marker-end="url(#a)"/>
  <!-- dashboard <-> DB -->
  <line x1="690" y1="392" x2="690" y2="372" stroke="#e8710a" stroke-width="1.8" marker-end="url(#a)"/>
  <!-- DB -> view -->
  <line x1="820" y1="240" x2="880" y2="240" stroke="#3c4043" stroke-width="2.2" marker-end="url(#a)"/>
  <!-- view -> OneSync -->
  <line x1="1060" y1="244" x2="1120" y2="244" stroke="#3c4043" stroke-width="2.2" marker-end="url(#a)"/>
  <!-- OneSync -> endpoints -->
  <line x1="1290" y1="220" x2="1340" y2="180" stroke="#3c4043" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="1290" y1="240" x2="1340" y2="229" stroke="#3c4043" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="1290" y1="262" x2="1340" y2="280" stroke="#3c4043" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- WRITE-BACK LOOP -->
  <rect x="700" y="540" width="240" height="58" rx="8" fill="#f3e8fd" stroke="#8430ce" stroke-width="1.8"/>
  <text x="820" y="564" font-size="12.5" font-weight="700" fill="#5b1ca0" text-anchor="middle">usernames file</text>
  <text x="820" y="582" font-size="10.5" fill="#5b1ca0" text-anchor="middle">OneSync output</text>

  <rect x="1000" y="540" width="240" height="58" rx="8" fill="#f3e8fd" stroke="#8430ce" stroke-width="1.5"/>
  <text x="1120" y="562" font-size="12" font-weight="700" fill="#5b1ca0" text-anchor="middle">PowerSchool SIS / SSO</text>
  <text x="1120" y="580" font-size="10.5" fill="#5b1ca0" text-anchor="middle">2 AM autocomm import</text>

  <rect x="400" y="540" width="240" height="58" rx="8" fill="#ede7f6" stroke="#8430ce" stroke-width="1.5"/>
  <text x="520" y="562" font-size="12" font-weight="700" fill="#5b1ca0" text-anchor="middle">writeback importer</text>
  <text x="520" y="580" font-size="10.5" fill="#5b1ca0" text-anchor="middle">→ person.username (locked)</text>

  <!-- loop arrows -->
  <path d="M1205,320 C1205,470 1060,520 940,560" fill="none" stroke="#8430ce" stroke-width="1.8" marker-end="url(#ap)"/>
  <text x="1120" y="455" font-size="10.5" font-weight="700" fill="#8430ce" text-anchor="middle">mints → writes file</text>
  <line x1="1000" y1="569" x2="940" y2="569" stroke="#8430ce" stroke-width="1.8" marker-end="url(#ap)"/>
  <line x1="700" y1="569" x2="640" y2="569" stroke="#8430ce" stroke-width="1.8" marker-end="url(#ap)"/>
  <path d="M520,540 C520,470 600,400 600,372" fill="none" stroke="#8430ce" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#ap)"/>
  <text x="470" y="455" font-size="10.5" font-weight="700" fill="#8430ce" text-anchor="middle">username locked in DB</text>

  <!-- footer notes -->
  <rect x="40" y="660" width="1480" height="180" rx="8" fill="#fafafa" stroke="#dadce0" stroke-width="1.5"/>
  <text x="58" y="686" font-size="13" font-weight="700" fill="#3c4043">How this fixes the four problems</text>
  <text x="58" y="710" font-size="11.5" fill="#3c4043">• Per-source duplication → one source (the DB view) means one OneSync user per person; the crosswalk absorbs every system ID.</text>
  <text x="58" y="732" font-size="11.5" fill="#3c4043">• Intern → employee → the person keeps their record; hiring just adds new source IDs. Name-only matches are a dashboard "same person?" click.</text>
  <text x="58" y="754" font-size="11.5" fill="#3c4043">• Multi-location → assignment rows with one primary; no more skip-on-conflict.</text>
  <text x="58" y="776" font-size="11.5" fill="#3c4043">• Username authority → OneSync mints once, writes back, DB locks it. The manual Adaxes pick + Logins spreadsheet are retired.</text>
  <text x="58" y="804" font-size="11" font-style="italic" fill="#5f6368">PowerSchool stays SIS/SSO (receives staff records from the DB + the username via 2 AM autocomm). NextGen stays the HR feed.</text>
  <text x="58" y="826" font-size="11" font-weight="700" fill="#8430ce">Confirm before build: v_onesync_source field names · ethnicity + school code maps · matching thresholds · feed delivery/schedule · DB backups + role-based access.</text>
</svg>
