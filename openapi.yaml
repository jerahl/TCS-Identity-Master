      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneSyncAuth'
      responses:
        '200':
          description: Success (payload typically wrapped in ApiResponse).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized
