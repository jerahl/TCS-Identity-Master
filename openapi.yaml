openapi: 3.0.3
info:
  title: OneSync API
  version: v1p0
  description: Reverse-engineered from the deployed OneSync build (ClassLink identity/roster sync). Paths, HTTP verbs, and parameter
    names/types were extracted from OneSync.dll metadata; DTO schemas from OneSyncLibrary.dll. Responses are typically wrapped in an
    ApiResponse envelope (exact shape not fully recovered). Treat request/response bodies as a strong guide, not a contract — verify
    against a live instance.
servers:
- url: /v1p0
  description: 'Same-origin API base used by the Angular SPA (dev: http://localhost:5000)'
security:
- bearerAuth: []
tags:
- name: Auth
- name: Base
- name: Collections
- name: Correlation
- name: Destinations
- name: FTPs
- name: Logs
- name: PasswordGenerators
- name: RequireAuth
- name: Settings
- name: Sources
- name: Unauth
- name: Users
- name: Workers
- name: Workflows
